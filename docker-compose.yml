services:
  # ── Both backends in one container ────────────────────────────────────────
  # Legacy BiLSTM-CRF  → :5000   (/api/*)
  # NextGen DeBERTa    → :5001   (/api/nextgen/*)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "5000:5000"
      - "5001:5001"
    env_file:
      - backend/.env
    volumes:
      - .:/app
      - /app/venv
      - /app/__pycache__

  # ── Vue CLI frontend (port 8080) ───────────────────────────────────────────
  # Proxies /api/nextgen → backend:5001, /api → backend:5000
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  # ── ngrok tunnel ────────────────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http --domain=secure-openly-moth.ngrok-free.app frontend:8080
    env_file:
      - backend/.env
    ports:
      - "4040:4040"
    depends_on:
      - frontend
