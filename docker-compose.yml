services:
  # ── Both backends in one container ────────────────────────────────────────
  # Legacy BiLSTM-CRF  → port 5000
  # NextGen DeBERTa    → port 5001
  backend:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "5000:5000"
      - "5001:5001"
    env_file:
      - backend/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - .:/app
      - /app/venv
      - /app/__pycache__
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── React/Vite frontend (port 3000) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  # ── ngrok tunnel ────────────────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http --domain=secure-openly-moth.ngrok-free.app frontend:3000
    env_file:
      - backend/.env
    ports:
      - "4040:4040"
    depends_on:
      - frontend
