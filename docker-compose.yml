services:
  # ── Legacy BiLSTM-CRF engine (port 5000) ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    environment:
      - FLASK_APP=backend/app.py
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - .:/app
      - /app/venv
      - /app/__pycache__
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: python -u backend/app.py

  # ── NextGen DeBERTa pipeline (port 5001) ───────────────────────────────────
  backend_nextgen:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "5001:5001"
    env_file:
      - backend/.env
    environment:
      - FLASK_APP=run_nextgen.py
      - NEXTGEN_CONFIG_PATH=backend_nextgen/config/nextgen_config.yml
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - .:/app
      - /app/venv
      - /app/__pycache__
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: python -u run_nextgen.py

  # ── React/Vite frontend (port 3000) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
      - backend_nextgen

  # ── ngrok tunnel ────────────────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http --domain=secure-openly-moth.ngrok-free.app frontend:3000
    env_file:
      - backend/.env
    ports:
      - "4040:4040"
    depends_on:
      - frontend
